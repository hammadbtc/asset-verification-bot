<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordinal Eggs Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e6edf3;
            padding: 20px;
        }
        
        .container {
            background: rgba(22, 27, 34, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 32px;
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(48, 54, 61, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 16px;
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.3);
        }
        
        h1 { 
            font-size: 1.5rem; 
            font-weight: 700;
            margin-bottom: 4px;
            color: #fff;
        }
        
        .subtitle {
            color: #8b949e;
            font-size: 0.9rem;
        }
        
        .status-card {
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid rgba(48, 54, 61, 0.6);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .status-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }
        
        .status-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .status-text {
            color: #8b949e;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .wallet-info {
            background: rgba(35, 197, 94, 0.1);
            border: 1px solid rgba(35, 197, 94, 0.3);
            border-radius: 10px;
            padding: 16px;
            margin: 16px 0;
        }
        
        .wallet-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
            margin-bottom: 8px;
        }
        
        .wallet-address {
            font-family: 'SF Mono', monospace;
            font-size: 0.85rem;
            color: #7ee787;
            word-break: break-all;
        }
        
        .nft-grid {
            display: grid;
            gap: 8px;
            margin-top: 12px;
        }
        
        .nft-item {
            background: rgba(48, 54, 61, 0.5);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .nft-name {
            font-weight: 500;
            color: #fff;
        }
        
        .nft-count {
            background: rgba(35, 197, 94, 0.2);
            color: #7ee787;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        button {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        
        .btn-secondary {
            background: rgba(48, 54, 61, 0.8);
            color: #e6edf3;
            border: 1px solid rgba(48, 54, 61, 1);
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: rgba(48, 54, 61, 1);
            border-color: #8b949e;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(34, 197, 94, 0.3);
        }
        
        .btn-success:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }
        
        .btn-warning {
            background: rgba(234, 179, 8, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }
        
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .wallet-option {
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid rgba(48, 54, 61, 0.8);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .wallet-option:hover {
            background: rgba(48, 54, 61, 0.5);
            border-color: #3b82f6;
        }
        
        .wallet-icon {
            font-size: 1.5rem;
        }
        
        .wallet-name {
            font-weight: 600;
            color: #fff;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #6e7681;
        }
        
        .hidden { display: none !important; }
        .success { color: #7ee787; }
        .error { color: #f85149; }
        .warning { color: #fbbf24; }
        
        .divider {
            height: 1px;
            background: rgba(48, 54, 61, 0.6);
            margin: 16px 0;
        }
        
        .summary-box {
            background: rgba(35, 197, 94, 0.1);
            border: 1px solid rgba(35, 197, 94, 0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .summary-count {
            font-size: 2rem;
            font-weight: 700;
            color: #7ee787;
        }
        
        .summary-label {
            color: #8b949e;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🥚</div>
            <h1>Ordinal Eggs</h1>
            <p class="subtitle">Holder Verification</p>
        </div>
        
        <div class="status-card" id="status-card">
            <div class="status-icon">👛</div>
            <div class="status-title">Connect Your Wallet</div>
            <div class="status-text">Choose a wallet to verify your NFT ownership</div>
        </div>

        <div id="wallet-section" class="hidden">
            <div class="wallet-info" id="wallet-info"></div>
        </div>

        <!-- Wallet buttons shown directly -->
        <div id="wallet-buttons">
            <button class="btn-primary" id="unisat-btn" onclick="connectSpecificWallet('unisat')">
                <span>🔷</span> Connect Unisat
            </button>
            
            <button class="btn-secondary" id="xverse-btn" onclick="connectSpecificWallet('xverse')">
                <span>🟠</span> Connect Xverse
            </button>
        </div>
        
        <button class="btn-success hidden" id="verify-btn">
            Sign Message
        </button>
        
        <button class="btn-secondary hidden" id="disconnect-btn" onclick="disconnectWallet()">
            Disconnect
        </button>

        <div class="footer">
            Secure message signing • No private keys stored
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const userId = urlParams.get('user');
        const guildId = urlParams.get('guild');

        let connectedWallets = [];
        let currentWallet = null;

        const statusCard = document.getElementById('status-card');
        const unisatBtn = document.getElementById('unisat-btn');
        const xverseBtn = document.getElementById('xverse-btn');
        const verifyBtn = document.getElementById('verify-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const walletButtons = document.getElementById('wallet-buttons');
        const walletSection = document.getElementById('wallet-section');
        const walletInfo = document.getElementById('wallet-info');

        if (!sessionId || !userId) {
            updateStatus('⚠️', 'Invalid Link', 'Please use the link from Discord.', 'error');
            unisatBtn.disabled = true;
            xverseBtn.disabled = true;
        }

        function updateStatus(icon, title, text, type = '') {
            statusCard.innerHTML = `
                <div class="status-icon ${type}">${icon}</div>
                <div class="status-title ${type}">${title}</div>
                <div class="status-text">${text}</div>
            `;
        }

        async function connectSpecificWallet(walletType) {
            if (walletType === 'unisat' && !window.unisat) {
                updateStatus('📱', 'Wallet Not Found', 'Please install Unisat extension and refresh.', 'warning');
                return;
            }
            if (walletType === 'xverse' && !window.bitcoin?.xverse) {
                updateStatus('📱', 'Wallet Not Found', 'Please install Xverse extension and refresh.', 'warning');
                return;
            }
            
            updateStatus('⏳', 'Connecting...', `Connecting to ${walletType}...`);
            
            try {
                let address;
                if (walletType === 'unisat' && window.unisat) {
                    const accounts = await window.unisat.requestAccounts();
                    address = accounts[0];
                } else if (walletType === 'xverse' && window.bitcoin?.xverse) {
                    const response = await window.bitcoin.xverse.connect();
                    address = response.address;
                } else {
                    throw new Error('Wallet not available');
                }

                if (connectedWallets.some(w => w.address === address)) {
                    updateStatus('⚠️', 'Already Connected', 'This wallet is already signed.', 'warning');
                    return;
                }

                currentWallet = { type: walletType, address: address };
                
                walletSection.classList.remove('hidden');
                walletButtons.classList.add('hidden');
                disconnectBtn.classList.remove('hidden');
                
                updateStatus('⏳', 'Fetching NFTs...', 'Checking your Ordinals...');
                const walletNFTs = await fetchNFTsForWallet(currentWallet);
                currentWallet.nfts = walletNFTs;
                
                showCurrentWalletInfo();

            } catch (err) {
                console.error('Connection error:', err);
                updateStatus('❌', 'Connection Failed', err.message, 'error');
            }
        }

        function showCurrentWalletInfo() {
            const eggs = currentWallet.nfts.filter(nft => {
                const num = parseInt(nft.number);
                return num >= 1 && num <= 10000;
            });
            
            const cluckers = currentWallet.nfts.filter(nft => {
                return nft.contentType?.includes('html') || 
                       nft.name?.toLowerCase().includes('clucker');
            });
            
            const totalFound = eggs.length + cluckers.length;
            
            walletInfo.innerHTML = `
                <div class="wallet-label">Connected Wallet</div>
                <div class="wallet-address">${currentWallet.address}</div>
                <div class="divider"></div>
                <div class="nft-grid">
                    <div class="nft-item">
                        <span class="nft-name">🥚 Ordinal Eggs</span>
                        <span class="nft-count">${eggs.length}</span>
                    </div>
                    <div class="nft-item">
                        <span class="nft-name">🐔 Mother Cluckers</span>
                        <span class="nft-count">${cluckers.length}</span>
                    </div>
                </div>
            `;
            
            verifyBtn.classList.remove('hidden');
            if (totalFound > 0) {
                verifyBtn.textContent = `✍️ Sign with This Wallet (${totalFound} NFTs)`;
                verifyBtn.classList.remove('btn-warning');
                verifyBtn.classList.add('btn-success');
                verifyBtn.onclick = signCurrentWallet;
            } else {
                verifyBtn.textContent = `Skip (No NFTs Found)`;
                verifyBtn.classList.remove('btn-success');
                verifyBtn.classList.add('btn-warning');
                verifyBtn.onclick = skipCurrentWallet;
            }
            
            updateStatus('✅', 'Wallet Connected', `${totalFound} NFTs found in this wallet`, 'success');
        }

        async function signCurrentWallet() {
            updateStatus('⏳', 'Waiting for Signature...', 'Please approve the signature in your wallet');
            verifyBtn.disabled = true;

            try {
                const timestamp = Date.now();
                const message = `Verify NFT ownership for Discord user ${userId} at ${timestamp}`;
                
                let signature;
                if (currentWallet.type === 'unisat') {
                    signature = await window.unisat.signMessage(message, 'bip322-simple');
                } else if (currentWallet.type === 'xverse') {
                    signature = await window.bitcoin.xverse.signMessage(message);
                }
                
                currentWallet.signature = signature;
                currentWallet.message = message;
                connectedWallets.push(currentWallet);
                
                updateStatus('✅', 'Signed!', `Wallet ${connectedWallets.length} verified`, 'success');
                showPostSignOptions();

            } catch (err) {
                console.error('Signing error:', err);
                updateStatus('❌', 'Signing Failed', err.message, 'error');
                verifyBtn.disabled = false;
            }
        }

        function skipCurrentWallet() {
            currentWallet = null;
            updateStatus('⚠️', 'Skipped', 'No qualifying NFTs in this wallet', 'warning');
            showPostSignOptions();
        }

        function showPostSignOptions() {
            verifyBtn.classList.add('hidden');
            verifyBtn.disabled = false;
            verifyBtn.classList.remove('btn-warning');
            verifyBtn.classList.add('btn-success');
            
            const totalNFTs = connectedWallets.reduce((sum, w) => sum + (w.nfts?.length || 0), 0);
            
            const existingActions = document.getElementById('action-buttons');
            if (existingActions) existingActions.remove();
            
            const actionDiv = document.createElement('div');
            actionDiv.id = 'action-buttons';
            actionDiv.innerHTML = `
                <div class="summary-box">
                    <div class="summary-count">${connectedWallets.length}</div>
                    <div class="summary-label">wallet(s) verified • ${totalNFTs} NFTs total</div>
                </div>
                <button class="btn-secondary" id="add-another-btn" style="margin-bottom: 10px;">
                    <span>+</span> Add Another Wallet
                </button>
                ${connectedWallets.length > 0 ? `
                <button class="btn-primary" id="complete-verify-btn">
                    <span>✅</span> Complete Verification
                </button>` : ''}
            `;
            
            walletSection.appendChild(actionDiv);
            
            document.getElementById('add-another-btn').onclick = () => {
                actionDiv.remove();
                walletButtons.classList.remove('hidden');
                updateStatus('👛', 'Connect Another', 'Add more wallets to aggregate your NFTs');
            };
            
            const completeBtn = document.getElementById('complete-verify-btn');
            if (completeBtn) {
                completeBtn.onclick = submitAllWallets;
            }
        }

        async function submitAllWallets() {
            updateStatus('⏳', 'Submitting...', 'Verifying your wallets...');
            
            try {
                const walletProofs = connectedWallets.map(w => ({
                    address: w.address,
                    type: w.type,
                    signature: w.signature,
                    nfts: w.nfts || []
                }));
                
                const message = connectedWallets[0]?.message || `Verify NFT ownership for Discord user ${userId}`;

                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId,
                        userId,
                        guildId,
                        wallets: walletProofs,
                        message
                    })
                });

                const result = await response.json();

                if (result.success) {
                    updateStatus('🎉', 'Verified!', 'You can close this window and return to Discord.', 'success');
                    const actionDiv = document.getElementById('action-buttons');
                    if (actionDiv) actionDiv.innerHTML = '';
                } else {
                    updateStatus('❌', 'Failed', result.error || 'Verification failed', 'error');
                }

            } catch (err) {
                console.error('Verification error:', err);
                updateStatus('❌', 'Error', err.message, 'error');
            }
        }

        async function fetchNFTsForWallet(wallet) {
            try {
                const response = await fetch(`/api/nfts?address=${wallet.address}`);
                const data = await response.json();
                return data.nfts || [];
            } catch (err) {
                console.error('Failed to fetch NFTs:', err);
                return [];
            }
        }

        function disconnectWallet() {
            connectedWallets = [];
            currentWallet = null;
            walletSection.classList.add('hidden');
            walletButtons.classList.remove('hidden');
            verifyBtn.classList.add('hidden');
            verifyBtn.disabled = false;
            verifyBtn.classList.remove('btn-warning');
            verifyBtn.classList.add('btn-success');
            disconnectBtn.classList.add('hidden');
            const actionDiv = document.getElementById('action-buttons');
            if (actionDiv) actionDiv.remove();
            updateStatus('👛', 'Connect Your Wallet', 'Choose a wallet to verify your NFT ownership');
        }
    </script>
</body>
</html>
