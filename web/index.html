<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordinal Eggs — Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --white: #ffffff;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-800: #262626;
            --gray-900: #171717;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Animated Background - Exact match to Ordinal Eggs */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.02) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(255,255,255,0.01) 0%, transparent 30%),
                        radial-gradient(circle at 70% 60%, rgba(147, 197, 253, 0.05) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2%, 2%) rotate(1deg); }
            50% { transform: translate(-1%, 3%) rotate(-1deg); }
            75% { transform: translate(3%, -2%) rotate(0.5deg); }
        }

        /* Glass Card - Black brick style */
        .container {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(147, 197, 253, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, rgba(147, 197, 253, 0.3) 0%, transparent 50%);
            border-radius: 18px;
            z-index: -1;
            filter: blur(8px);
        }

        h1 { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem; 
            font-weight: 700;
            margin-bottom: 4px;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--gray-400);
            font-size: 0.95rem;
            font-weight: 400;
        }

        /* Status Card - Dark brick */
        .status-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .status-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(147, 197, 253, 0.3), transparent);
        }

        .status-icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .status-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #fff;
        }

        .status-text {
            color: var(--gray-400);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Warning State */
        .status-card.warning {
            border-color: rgba(234, 179, 8, 0.3);
            background: rgba(234, 179, 8, 0.05);
        }

        .status-card.warning::before {
            background: linear-gradient(90deg, transparent, rgba(234, 179, 8, 0.4), transparent);
        }

        /* Success State */
        .status-card.success {
            border-color: rgba(34, 197, 94, 0.3);
            background: rgba(34, 197, 94, 0.05);
        }

        .status-card.success::before {
            background: linear-gradient(90deg, transparent, rgba(34, 197, 94, 0.4), transparent);
        }

        /* Wallet Info */
        .wallet-info {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            margin: 16px 0;
            position: relative;
            z-index: 1;
        }

        .wallet-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-500);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .wallet-address {
            font-family: 'SF Mono', monospace;
            font-size: 0.85rem;
            color: #93c5fd;
            word-break: break-all;
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 16px 0;
        }

        /* NFT Grid */
        .nft-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nft-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .nft-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }

        .nft-name {
            font-weight: 500;
            color: #fff;
            font-size: 0.95rem;
        }

        .nft-count {
            background: rgba(147, 197, 253, 0.15);
            color: #93c5fd;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(147, 197, 253, 0.2);
        }

        /* Buttons - Ordinal Eggs Style */
        button {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-wallet {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .btn-wallet:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.25);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.25);
            transform: translateY(-1px);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.4);
        }

        .btn-warning {
            background: rgba(234, 179, 8, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .btn-warning:hover:not(:disabled) {
            background: rgba(234, 179, 8, 0.15);
        }

        /* Summary Box */
        .summary-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
            position: relative;
        }

        .summary-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(34, 197, 94, 0.4), transparent);
        }

        .summary-count {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #22c55e;
            margin-bottom: 4px;
        }

        .summary-label {
            color: var(--gray-400);
            font-size: 0.85rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--gray-600);
            position: relative;
            z-index: 1;
        }

        .hidden { display: none !important; }

        /* Floating elements decoration */
        .floating-ring {
            position: fixed;
            border: 1px solid rgba(147, 197, 253, 0.1);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-ring:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            animation: float 20s ease-in-out infinite;
        }

        .floating-ring:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -100px;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 30px) rotate(180deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 24px;
                margin: 16px;
            }
            
            h1 {
                font-size: 1.3rem;
            }
            
            .summary-count {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation"></div>
    
    <!-- Decorative Rings -->
    <div class="floating-ring"></div>
    <div class="floating-ring"></div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="logo.jpg" alt="Ordinal Eggs" style="width: 110%; height: 110%; object-fit: cover; border-radius: 12px; transform: scale(1.1);">
            </div>
            <h1>Ordinal Eggs</h1>
            <p class="subtitle">Verification Bot — Connect your wallet</p>
        </div>
        
        <div class="status-card" id="status-card">
            <div class="status-icon">🔐</div>
            <div class="status-title">Connect Your Wallet</div>
            <div class="status-text">Choose a wallet to verify your NFT ownership</div>
        </div>

        <div id="wallet-section" class="hidden">
            <div class="wallet-info" id="wallet-info"></div>
        </div>

        <!-- Wallet buttons shown directly -->
        <div id="wallet-buttons">
            <button class="btn-wallet" id="unisat-btn" onclick="connectSpecificWallet('unisat')">
                <img src="unisat-logo.png" alt="" style="width: 20px; height: 20px; border-radius: 4px;"> Connect Unisat
            </button>
            
            <button class="btn-wallet" id="xverse-btn" onclick="connectSpecificWallet('xverse')">
                <img src="xverse-logo.jpg" alt="" style="width: 20px; height: 20px; border-radius: 4px;"> Connect Xverse
            </button>
        </div>
        
        <button class="btn-success hidden" id="verify-btn">
            Sign Message
        </button>
        
        <button class="btn-secondary hidden" id="disconnect-btn" onclick="disconnectWallet()">
            Disconnect
        </button>

        <div class="footer">
            Secure message signing • No private keys stored
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const userId = urlParams.get('user');
        const guildId = urlParams.get('guild');

        let connectedWallets = [];
        let currentWallet = null;

        const statusCard = document.getElementById('status-card');
        const unisatBtn = document.getElementById('unisat-btn');
        const xverseBtn = document.getElementById('xverse-btn');
        const verifyBtn = document.getElementById('verify-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const walletButtons = document.getElementById('wallet-buttons');
        const walletSection = document.getElementById('wallet-section');
        const walletInfo = document.getElementById('wallet-info');

        if (!sessionId || !userId) {
            statusCard.className = 'status-card warning';
            statusCard.innerHTML = `
                <div class="status-icon">⚠️</div>
                <div class="status-title">Invalid Link</div>
                <div class="status-text">Please use the verification link from Discord.</div>
            `;
            unisatBtn.disabled = true;
            xverseBtn.disabled = true;
        }

        function updateStatus(icon, title, text, type = '') {
            statusCard.className = 'status-card ' + type;
            statusCard.innerHTML = `
                <div class="status-icon">${icon}</div>
                <div class="status-title">${title}</div>
                <div class="status-text">${text}</div>
            `;
        }

        async function connectSpecificWallet(walletType) {
            if (walletType === 'unisat' && !window.unisat) {
                updateStatus('📱', 'Wallet Not Found', 'Please install Unisat extension and refresh.', 'warning');
                return;
            }
            if (walletType === 'xverse' && !window.bitcoin?.xverse) {
                updateStatus('📱', 'Wallet Not Found', 'Please install Xverse extension and refresh.', 'warning');
                return;
            }
            
            updateStatus('⏳', 'Connecting...', `Connecting to ${walletType}...`);
            
            try {
                let address;
                if (walletType === 'unisat' && window.unisat) {
                    const accounts = await window.unisat.requestAccounts();
                    address = accounts[0];
                } else if (walletType === 'xverse' && window.bitcoin?.xverse) {
                    const response = await window.bitcoin.xverse.connect();
                    address = response.address;
                } else {
                    throw new Error('Wallet not available');
                }

                if (connectedWallets.some(w => w.address === address)) {
                    updateStatus('⚠️', 'Already Connected', 'This wallet is already signed.', 'warning');
                    return;
                }

                currentWallet = { type: walletType, address: address };
                
                walletSection.classList.remove('hidden');
                walletButtons.classList.add('hidden');
                disconnectBtn.classList.remove('hidden');
                
                updateStatus('⏳', 'Fetching NFTs...', 'Checking your Ordinals...');
                const walletNFTs = await fetchNFTsForWallet(currentWallet);
                currentWallet.nfts = walletNFTs;
                
                showCurrentWalletInfo();

            } catch (err) {
                console.error('Connection error:', err);
                updateStatus('❌', 'Connection Failed', err.message, 'error');
            }
        }

        function showCurrentWalletInfo() {
            const eggs = currentWallet.nfts.filter(nft => {
                const num = parseInt(nft.number);
                return num >= 1 && num <= 10000;
            });
            
            const cluckers = currentWallet.nfts.filter(nft => {
                const name = (nft.name || '').toLowerCase();
                if (name.includes('clucker')) return true;
                
                const contentType = (nft.contentType || '').toLowerCase();
                if (contentType.includes('text/html')) return true;
                if (contentType.includes('html')) return true;
                
                return false;
            });
            
            const totalFound = eggs.length + cluckers.length;
            
            walletInfo.innerHTML = `
                <div class="wallet-label">Connected Wallet</div>
                <div class="wallet-address">${currentWallet.address}</div>
                <div class="divider"></div>
                <div class="nft-grid">
                    <div class="nft-item">
                        <span class="nft-name">🥚 Ordinal Eggs</span>
                        <span class="nft-count">${eggs.length}</span>
                    </div>
                    <div class="nft-item">
                        <span class="nft-name">🐔 Mother Cluckers</span>
                        <span class="nft-count">${cluckers.length}</span>
                    </div>
                </div>
            `;
            
            verifyBtn.classList.remove('hidden');
            if (totalFound > 0) {
                verifyBtn.textContent = `✍️ Sign with This Wallet (${totalFound} NFTs)`;
                verifyBtn.classList.remove('btn-warning');
                verifyBtn.classList.add('btn-success');
                verifyBtn.onclick = signCurrentWallet;
            } else {
                verifyBtn.textContent = `Skip (No NFTs Found)`;
                verifyBtn.classList.remove('btn-success');
                verifyBtn.classList.add('btn-warning');
                verifyBtn.onclick = skipCurrentWallet;
            }
            
            updateStatus('✅', 'Wallet Connected', `${totalFound} NFTs found in this wallet`, 'success');
        }

        async function signCurrentWallet() {
            updateStatus('⏳', 'Waiting for Signature...', 'Please approve the signature in your wallet');
            verifyBtn.disabled = true;

            try {
                const timestamp = Date.now();
                const message = `Verify NFT ownership for Discord user ${userId} at ${timestamp}`;
                
                let signature;
                if (currentWallet.type === 'unisat') {
                    signature = await window.unisat.signMessage(message, 'bip322-simple');
                } else if (currentWallet.type === 'xverse') {
                    signature = await window.bitcoin.xverse.signMessage(message);
                }
                
                currentWallet.signature = signature;
                currentWallet.message = message;
                connectedWallets.push(currentWallet);
                
                updateStatus('✅', 'Signed!', `Wallet ${connectedWallets.length} verified`, 'success');
                showPostSignOptions();

            } catch (err) {
                console.error('Signing error:', err);
                updateStatus('❌', 'Signing Failed', err.message, 'error');
                verifyBtn.disabled = false;
            }
        }

        function skipCurrentWallet() {
            currentWallet = null;
            updateStatus('⚠️', 'Skipped', 'No qualifying NFTs in this wallet', 'warning');
            showPostSignOptions();
        }

        function showPostSignOptions() {
            verifyBtn.classList.add('hidden');
            verifyBtn.disabled = false;
            verifyBtn.classList.remove('btn-warning');
            verifyBtn.classList.add('btn-success');
            
            const totalNFTs = connectedWallets.reduce((sum, w) => sum + (w.nfts?.length || 0), 0);
            
            const existingActions = document.getElementById('action-buttons');
            if (existingActions) existingActions.remove();
            
            const actionDiv = document.createElement('div');
            actionDiv.id = 'action-buttons';
            actionDiv.innerHTML = `
                <div class="summary-box">
                    <div class="summary-count">${connectedWallets.length}</div>
                    <div class="summary-label">wallet(s) verified • ${totalNFTs} NFTs total</div>
                </div>
                <button class="btn-secondary" id="add-another-btn" style="margin-bottom: 10px;">
                    <span>+</span> Add Another Wallet
                </button>
                ${connectedWallets.length > 0 ? `
                <button class="btn-primary" id="complete-verify-btn">
                    <span>✅</span> Complete Verification
                </button>` : ''}
            `;
            
            walletSection.appendChild(actionDiv);
            
            document.getElementById('add-another-btn').onclick = () => {
                actionDiv.remove();
                walletButtons.classList.remove('hidden');
                updateStatus('👛', 'Connect Another', 'Add more wallets to aggregate your NFTs');
            };
            
            const completeBtn = document.getElementById('complete-verify-btn');
            if (completeBtn) {
                completeBtn.onclick = submitAllWallets;
            }
        }

        async function submitAllWallets() {
            updateStatus('⏳', 'Submitting...', 'Verifying your wallets...');
            
            try {
                const walletProofs = connectedWallets.map(w => ({
                    address: w.address,
                    type: w.type,
                    signature: w.signature,
                    nfts: w.nfts || []
                }));
                
                const message = connectedWallets[0]?.message || `Verify NFT ownership for Discord user ${userId}`;

                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId,
                        userId,
                        guildId,
                        wallets: walletProofs,
                        message
                    })
                });

                const result = await response.json();

                if (result.success) {
                    updateStatus('🎉', 'Verified!', 'You can close this window and return to Discord.', 'success');
                    const actionDiv = document.getElementById('action-buttons');
                    if (actionDiv) actionDiv.innerHTML = '';
                } else {
                    updateStatus('❌', 'Failed', result.error || 'Verification failed', 'error');
                }

            } catch (err) {
                console.error('Verification error:', err);
                updateStatus('❌', 'Error', err.message, 'error');
            }
        }

        async function fetchNFTsForWallet(wallet) {
            try {
                const response = await fetch(`/api/nfts?address=${wallet.address}`);
                const data = await response.json();
                return data.nfts || [];
            } catch (err) {
                console.error('Failed to fetch NFTs:', err);
                return [];
            }
        }

        function disconnectWallet() {
            connectedWallets = [];
            currentWallet = null;
            walletSection.classList.add('hidden');
            walletButtons.classList.remove('hidden');
            verifyBtn.classList.add('hidden');
            verifyBtn.disabled = false;
            verifyBtn.classList.remove('btn-warning');
            verifyBtn.classList.add('btn-success');
            disconnectBtn.classList.add('hidden');
            const actionDiv = document.getElementById('action-buttons');
            if (actionDiv) actionDiv.remove();
            updateStatus('👛', 'Connect Your Wallet', 'Choose a wallet to verify your NFT ownership');
        }
    </script>
</body>
</html>
