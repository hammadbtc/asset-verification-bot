<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordinal Eggs Verification Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; text-align: center; }
        .subtitle { 
            color: #888; 
            text-align: center; 
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .status {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .status-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .wallet-info {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        .nft-preview {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .nft-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #888;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
        
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        
        .wallet-option {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        
        .wallet-option:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
        }
        
        .wallet-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 8px;
            margin: 5px 0;
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        .nft-counts {
            margin-top: 10px;
            font-size: 1.1rem;
        }
        
        .nft-counts div {
            margin: 5px 0;
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥚 Ordinal Eggs</h1>
        <p class="subtitle">Verification Bot - Connect your wallet</p>
        
        <div class="status" id="status">
            <div class="status-icon">👛</div>
            <div>Choose your wallet</div>
        </div>

        <div id="wallet-section" class="hidden">
            <div class="wallet-info" id="wallet-address"></div>
        </div>

        <!-- Wallet buttons shown directly -->
        <div id="wallet-buttons">
            <button class="btn-primary" id="unisat-btn" onclick="connectSpecificWallet('unisat')">
                🔷 Connect Unisat
            </button>
            
            <button class="btn-secondary" id="xverse-btn" onclick="connectSpecificWallet('xverse')">
                🟠 Connect Xverse
            </button>
        </div>
        
        <button class="btn-primary hidden" id="verify-btn">
            Sign & Verify
        </button>
        
        <button class="btn-secondary hidden" id="disconnect-btn" onclick="disconnectWallet()">
            Disconnect
        </button>

        <div class="footer">
            Secure message signing • No private keys stored
        </div>
    </div>

    <script>
        // Get verification session from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const userId = urlParams.get('user');
        const guildId = urlParams.get('guild');

        let connectedWallets = [];  // Array of {type, address, signature, nfts}
        let currentWallet = null;  // Wallet being connected (not yet signed)

        const statusEl = document.getElementById('status');
        const unisatBtn = document.getElementById('unisat-btn');
        const xverseBtn = document.getElementById('xverse-btn');
        const verifyBtn = document.getElementById('verify-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const walletButtons = document.getElementById('wallet-buttons');
        const walletSection = document.getElementById('wallet-section');
        const walletAddressEl = document.getElementById('wallet-address');

        // Check for session
        if (!sessionId || !userId) {
            statusEl.innerHTML = '<div class="status-icon">⚠️</div><div class="warning">Invalid verification link. Please use the link from Discord.</div>';
            unisatBtn.disabled = true;
            xverseBtn.disabled = true;
        }

        function updateStatus(icon, message, type = '') {
            statusEl.innerHTML = `<div class="status-icon">${icon}</div><div class="${type}">${message}</div>`;
        }

        async function connectSpecificWallet(walletType) {
            // Check wallet availability at click time (wallets inject async)
            if (walletType === 'unisat' && !window.unisat) {
                updateStatus('📱', 'Unisat not detected. Please install the extension and refresh.', 'warning');
                return;
            }
            if (walletType === 'xverse' && !window.bitcoin?.xverse) {
                updateStatus('📱', 'Xverse not detected. Please install the extension and refresh.', 'warning');
                return;
            }
            
            updateStatus('⏳', `Connecting to ${walletType}...`);
            
            try {
                let address;
                if (walletType === 'unisat' && window.unisat) {
                    const accounts = await window.unisat.requestAccounts();
                    address = accounts[0];
                } else if (walletType === 'xverse' && window.bitcoin?.xverse) {
                    const response = await window.bitcoin.xverse.connect();
                    address = response.address;
                } else {
                    throw new Error('Wallet not available');
                }

                // Check if already connected
                if (connectedWallets.some(w => w.address === address)) {
                    updateStatus('⚠️', 'This wallet is already connected and signed', 'warning');
                    return;
                }

                // Set as current wallet (not yet added to list)
                currentWallet = { type: walletType, address: address };
                
                // Update UI
                walletSection.classList.remove('hidden');
                walletButtons.classList.add('hidden');
                disconnectBtn.classList.remove('hidden');
                
                // Fetch NFTs for this wallet
                updateStatus('⏳', 'Fetching your NFTs...');
                const walletNFTs = await fetchNFTsForWallet(currentWallet);
                currentWallet.nfts = walletNFTs;
                
                // Show wallet info with Sign button
                showCurrentWalletInfo();

            } catch (err) {
                console.error('Connection error:', err);
                updateStatus('❌', 'Connection failed: ' + err.message, 'error');
            }
        }

        function showCurrentWalletInfo() {
            const eggs = currentWallet.nfts.filter(nft => {
                const num = parseInt(nft.number);
                return num >= 1 && num <= 10000;
            });
            
            const cluckers = currentWallet.nfts.filter(nft => {
                return nft.contentType?.includes('html') || 
                       nft.name?.toLowerCase().includes('clucker');
            });
            
            const totalFound = eggs.length + cluckers.length;
            
            walletAddressEl.innerHTML = `
                <div style="font-weight: bold; margin-bottom: 10px;">Connected Wallet:</div>
                <div class="wallet-item">${currentWallet.type === 'unisat' ? '🔷' : '🟠'} ${currentWallet.address.slice(0, 12)}...${currentWallet.address.slice(-6)}</div>
                <div style="margin-top: 15px; margin-bottom: 8px;">Found in this wallet:</div>
                <div class="nft-counts">
                    <div>🥚 Ordinal Eggs: ${eggs.length}</div>
                    <div>🐔 Mother Cluckers: ${cluckers.length}</div>
                </div>
            `;
            
            // Show Sign button (or Skip if no NFTs)
            verifyBtn.classList.remove('hidden');
            if (totalFound > 0) {
                verifyBtn.textContent = `✍️ Sign with this wallet (${totalFound} NFTs)`;
                verifyBtn.onclick = signCurrentWallet;
            } else {
                verifyBtn.textContent = `Skip (no NFTs found)`;
                verifyBtn.classList.add('btn-secondary');
                verifyBtn.classList.remove('btn-primary');
                verifyBtn.onclick = skipCurrentWallet;
            }
        }

        async function signCurrentWallet() {
            updateStatus('⏳', 'Waiting for signature...');
            verifyBtn.disabled = true;

            try {
                const timestamp = Date.now();
                const message = `Verify NFT ownership for Discord user ${userId} at ${timestamp}`;
                
                let signature;
                if (currentWallet.type === 'unisat') {
                    signature = await window.unisat.signMessage(message, 'bip322-simple');
                } else if (currentWallet.type === 'xverse') {
                    signature = await window.bitcoin.xverse.signMessage(message);
                }
                
                // Save wallet with signature
                currentWallet.signature = signature;
                currentWallet.message = message;
                connectedWallets.push(currentWallet);
                
                updateStatus('✅', `Wallet signed! Total: ${connectedWallets.length} wallet(s)`, 'success');
                
                // Show options to add more or finish
                showPostSignOptions();

            } catch (err) {
                console.error('Signing error:', err);
                updateStatus('❌', 'Signing failed: ' + err.message, 'error');
                verifyBtn.disabled = false;
            }
        }

        function skipCurrentWallet() {
            // Don't add to list, just reset
            currentWallet = null;
            updateStatus('⚠️', 'Wallet skipped (no qualifying NFTs)', 'warning');
            showPostSignOptions();
        }

        function showPostSignOptions() {
            // Hide sign button
            verifyBtn.classList.add('hidden');
            verifyBtn.disabled = false;
            verifyBtn.classList.remove('btn-secondary');
            verifyBtn.classList.add('btn-primary');
            
            // Show totals
            const totalNFTs = connectedWallets.reduce((sum, w) => sum + (w.nfts?.length || 0), 0);
            
            // Create action buttons
            const existingActions = document.getElementById('action-buttons');
            if (existingActions) existingActions.remove();
            
            const actionDiv = document.createElement('div');
            actionDiv.id = 'action-buttons';
            actionDiv.style.marginTop = '15px';
            actionDiv.innerHTML = `
                <div style="margin-bottom: 15px; padding: 12px; background: rgba(76,175,80,0.1); border-radius: 8px;">
                    <strong>✅ ${connectedWallets.length} wallet(s) verified</strong><br>
                    <span style="font-size: 0.9rem; opacity: 0.8;">${totalNFTs} total NFTs found</span>
                </div>
                <button class="btn-secondary" id="add-another-btn" style="width: 100%; margin-bottom: 10px;">
                    + Add Another Wallet
                </button>
                ${connectedWallets.length > 0 ? `
                <button class="btn-primary" id="complete-verify-btn" style="width: 100%;">
                    ✅ Complete Verification
                </button>` : ''}
            `;
            
            walletSection.appendChild(actionDiv);
            
            document.getElementById('add-another-btn').onclick = () => {
                actionDiv.remove();
                walletButtons.classList.remove('hidden');
                updateStatus('👛', 'Connect another wallet');
            };
            
            const completeBtn = document.getElementById('complete-verify-btn');
            if (completeBtn) {
                completeBtn.onclick = submitAllWallets;
            }
        }

        async function submitAllWallets() {
            updateStatus('⏳', 'Submitting verification...');
            
            try {
                // Send ALL signed wallets to server
                const walletProofs = connectedWallets.map(w => ({
                    address: w.address,
                    type: w.type,
                    signature: w.signature,
                    nfts: w.nfts || []
                }));
                
                // Use first wallet's message (same for all)
                const message = connectedWallets[0]?.message || `Verify NFT ownership for Discord user ${userId}`;

                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId,
                        userId,
                        guildId,
                        wallets: walletProofs,
                        message
                    })
                });

                const result = await response.json();

                if (result.success) {
                    updateStatus('🎉', 'Verification successful! You can close this window.', 'success');
                    const actionDiv = document.getElementById('action-buttons');
                    if (actionDiv) actionDiv.innerHTML = '';
                } else {
                    updateStatus('❌', result.error || 'Verification failed', 'error');
                }

            } catch (err) {
                console.error('Verification error:', err);
                updateStatus('❌', 'Submission failed: ' + err.message, 'error');
            }
        }

        async function fetchNFTsForWallet(wallet) {
            try {
                const response = await fetch(`/api/nfts?address=${wallet.address}`);
                const data = await response.json();
                return data.nfts || [];
            } catch (err) {
                console.error('Failed to fetch NFTs:', err);
                return [];
            }
        }

        function disconnectWallet() {
            connectedWallets = [];
            currentWallet = null;
            walletSection.classList.add('hidden');
            walletButtons.classList.remove('hidden');
            verifyBtn.classList.add('hidden');
            verifyBtn.disabled = false;
            verifyBtn.classList.remove('btn-secondary');
            verifyBtn.classList.add('btn-primary');
            disconnectBtn.classList.add('hidden');
            // Remove action buttons
            const actionDiv = document.getElementById('action-buttons');
            if (actionDiv) actionDiv.remove();
            updateStatus('👛', 'Choose your wallet');
        }
    </script>
</body>
</html>
